name: blind_social
description: Görme engelliler için erişilebilir iletişim ağı.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.6.1

  # Backend
  pocketbase: ^0.20.0
  
  # Real-time & Communication
  livekit_client: ^2.7.0
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^18.0.0
  
  # UI & Icons
  google_fonts: ^8.0.2
  url_launcher: ^6.3.1
  
  # Utils
  package_info_plus: ^8.1.0
  intl: ^0.20.2
  flutter_dotenv: ^5.1.0
  dart_jsonwebtoken: ^3.4.0
  record: ^6.2.0
  audioplayers: ^6.1.1
  just_audio: ^0.9.42
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  shared_preferences: ^2.5.1
  vibration: ^3.1.8
  sqflite: ^2.3.3+3
  share_plus: ^10.1.3
  path: ^1.9.0
  ffmpeg_kit_flutter_new_https: ^2.0.0
  flutter_secure_storage: ^9.2.2
  safe_device: 1.3.8
  device_info_plus: ^12.4.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  http: ^1.2.2
  flutter_ringtone_player: ^4.0.0
  emoji_picker_flutter: ^4.4.0
  file_picker: ^8.1.4
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  image_path_android: "assets/images/android_icon.png"
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#18181A"
    theme_color: "#18181A"

flutter:
  uses-material-design: true
  assets:
    - env.txt
    - assets/sounds/
